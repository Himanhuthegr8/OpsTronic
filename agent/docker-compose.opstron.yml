# ============================================================================
# OpsTronic Agent — Drop this file into your project
# ============================================================================
#
# SETUP (one time):
#   1. Log in at https://OpsTronicic.onrender.com/auth/github/login
#   2. Copy your API key from the dashboard
#   3. Set OPSTRON_API_KEY below (or export it as an env var)
#   4. Run: docker compose -f docker-compose.OpsTronic.yml up -d
#
# OPT YOUR CONTAINERS IN:
#   Add this label to any service you want OpsTronic to monitor:
#
#     labels:
#       OpsTronic.monitor: "true"
#
# That's it. OpsTronic will automatically detect errors and trigger RCA.
# ============================================================================

services:
  opstronic-agent:
    image: hitanshurathi/OpsTronic-agent:latest
    container_name: opstronic-agent
    restart: unless-stopped

    environment:
      # ✅ Required — get this from https://OpsTronicic.onrender.com after login
      OPSTRON_API_KEY: "${OPSTRON_API_KEY}"

      # OpsTronic backend URL (don't change unless self-hosting)
      OPSTRON_BACKEND_URL: "https://OpsTronicic.onrender.com"

      # How often to poll for new logs (seconds). Default: 30
      # OPSTRON_POLL_SECS: "30"

    volumes:
      # Read-only access to Docker socket — required for log reading
      # The agent CANNOT modify, stop, or restart any containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro

    # Keep the agent lightweight
    mem_limit: 64m
    cpus: "0.1"

  # ──────────────────────────────────────────────────────────────────────────
  # YOUR SERVICES BELOW — add `OpsTronic.monitor: "true"` to any you want watched
  # ──────────────────────────────────────────────────────────────────────────

  # Example: your-app:
  #   image: your-app:latest
  #   labels:
  #     OpsTronic.monitor: "true"   # ← OpsTronic watches this container
